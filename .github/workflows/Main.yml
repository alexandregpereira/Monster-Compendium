name: Multiplatform Main

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'media/**'
      - 'content/**'

env:
  MONSTER_COMPENDIUM_KEYSTORE_PASSWORD: ${{ secrets.MONSTER_COMPENDIUM_KEYSTORE_PASSWORD }}
  AMPLITUDE_API_KEY: ${{ secrets.AMPLITUDE_API_KEY }}
  AMPLITUDE_SANDBOX_API_KEY: ${{ secrets.AMPLITUDE_SANDBOX_API_KEY }}
  REVENUE_CAT_ANDROID_API_KEY: ${{ secrets.REVENUE_CAT_ANDROID_API_KEY }}
  REVENUE_CAT_IOS_API_KEY: ${{ secrets.REVENUE_CAT_IOS_API_KEY }}
  REVENUE_CAT_SANDBOX_API_KEY: ${{ secrets.REVENUE_CAT_SANDBOX_API_KEY }}

jobs:
  multiplatform-build:
    name: Android Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.5.0

      - name: set up JDK 17
        uses: actions/setup-java@v3.6.0
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew jvmTest testReleaseUnitTest assembleRelease bundleRelease

      - name: Verify database migration
        run: chmod +x ./scripts/sqldelight/verifyDatabaseMigration && ./scripts/sqldelight/verifyDatabaseMigration

      - name: Upload the test report
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: TestReport
          path: |
            feature-monster-compendium/build/reports/tests
            data/build/reports/tests
            domain/build/reports/tests

      - name: Rename AAB with version
        run: |
          VERSION=$(find app/build/outputs/apk/release -name 'app-release-*.apk' -exec basename {} .apk \; | sed 's/app-release-//')
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/app-release-${VERSION}.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release-*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release-*.aab

      - name: Upload APK metadata JSON
        uses: actions/upload-artifact@v4.6.2
        with:
          name: app-output-metadata-json
          path: app/build/outputs/apk/release/output-metadata.json

  android-dev-distribution:
    name: Android APK Dev Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.5.0

      - name: set up JDK 17
        uses: actions/setup-java@v3.6.0
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Dev Apk
        run: ./gradlew assembleRelease -Pdev

      - name: Get Dev APK path
        id: dev-apk-path
        run: echo "path=$(find app/build/outputs/apk/release -name 'app-dev-release-*.apk')" >> $GITHUB_OUTPUT

      - name: Upload Dev APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: ${{ steps.dev-apk-path.outputs.path }}
          groups: Testers

  macos-desktop-distribution:
    name: MacOs Desktop Distribution
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2.5.0

      - name: set up JDK 17
        uses: actions/setup-java@v3.6.0
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :app:packageReleaseDmg

      - name: Upload Dmg
        uses: actions/upload-artifact@v4.6.2
        with:
          name: MonsterCompendium-dmg
          path: app/build/compose/binaries/main-release/dmg/*.dmg

  linux-desktop-distribution:
    name: Linux Desktop Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.5.0

      - name: set up JDK 17
        uses: actions/setup-java@v3.6.0
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :app:packageReleaseDeb :app:packageReleaseRpm

      - name: Upload Deb
        uses: actions/upload-artifact@v4.6.2
        with:
          name: MonsterCompendium-deb
          path: app/build/compose/binaries/main-release/deb/*.deb

      - name: Upload Rpm
        uses: actions/upload-artifact@v4.6.2
        with:
          name: MonsterCompendium-rpm
          path: app/build/compose/binaries/main-release/rpm/*.rpm

  windows-desktop-distribution:
    name: Windows Desktop Distribution
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2.5.0

      - name: set up JDK 17
        uses: actions/setup-java@v3.6.0
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :app:packageReleaseMsi

      - name: Upload Msi
        uses: actions/upload-artifact@v4.6.2
        with:
          name: MonsterCompendium-msi
          path: app/build/compose/binaries/main-release/msi/*.msi
